<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Attendance Marker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="calendar">
    <div class="background-glow background-glow-a"></div>
    <div class="background-glow background-glow-b"></div>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gym Tracker</p>
          <h1 class="page-title">Monthly Attendance Calendar</h1>
        </div>

        <nav class="nav-links">
          <a class="nav-link active" href="./index.html">Calendar</a>
          <a class="nav-link" href="./dashboard.html">Dashboard</a>
        </nav>
      </header>

      <main class="single-panel">
        <section class="planner-panel">
          <div class="calendar-toolbar">
            <button id="prevMonthBtn" class="ghost-button" type="button">
              Previous
            </button>

            <div class="month-heading-wrap">
              <p class="eyebrow">Traditional Month View</p>
              <h2 id="activeMonthLabel" class="section-title"></h2>
            </div>

            <button id="nextMonthBtn" class="ghost-button" type="button">
              Next
            </button>
          </div>

          <div class="quick-actions">
            <button id="todayBtn" class="ghost-button" type="button">
              Go to current month
            </button>
            <button id="resetMonthBtn" class="danger-button" type="button">
              Reset this month
            </button>
          </div>

          <div class="legend-grid compact-legend">
            <span class="legend-chip legend-present">Present</span>
            <span class="legend-chip legend-absent">Absent</span>
            <span class="legend-chip legend-holiday">Holiday</span>
            <span class="legend-chip legend-sunday">Sunday</span>
            <span class="legend-chip legend-unmarked">Unmarked</span>
          </div>

          <div class="weekdays" aria-hidden="true">
            <span>Mon</span>
            <span>Tue</span>
            <span>Wed</span>
            <span>Thu</span>
            <span>Fri</span>
            <span>Sat</span>
            <span>Sun</span>
          </div>

          <div id="calendarGrid" class="calendar-grid indian-calendar"></div>

          <div id="monthSummary" class="month-summary summary-wide"></div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
