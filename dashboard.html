<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Attendance Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="background-glow background-glow-a"></div>
    <div class="background-glow background-glow-b"></div>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Gym Tracker</p>
          <h1 class="page-title">Dashboard</h1>
        </div>

        <nav class="nav-links">
          <a class="nav-link" href="./index.html">Calendar</a>
          <a class="nav-link active" href="./dashboard.html">Dashboard</a>
        </nav>
      </header>

      <main class="single-panel">
        <section class="dashboard-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Year Summary</p>
              <h2 class="section-title">Training Overview</h2>
            </div>

            <label class="field year-field">
              <span>Year</span>
              <select id="yearSelect" aria-label="Select dashboard year"></select>
            </label>
          </div>

          <div id="dashboardCards" class="metric-grid"></div>

          <div class="dashboard-secondary-grid">
            <article class="insight-card">
              <h3>Attendance Summary</h3>
              <div id="consistencyStats" class="detail-list"></div>
            </article>

            <article class="insight-card">
              <h3>Protein Summary</h3>
              <div id="nutritionStats" class="detail-list"></div>
            </article>

            <article class="insight-card">
              <h3>Best Month</h3>
              <div id="bestMonthStats" class="detail-list"></div>
            </article>

            <article class="insight-card">
              <h3>Workout Split</h3>
              <div id="workoutSplitStats" class="detail-list"></div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
